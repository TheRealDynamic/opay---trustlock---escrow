<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opay Escrow - Login</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Opay Escrow Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    alert("Login successful (demo)");
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
